<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Popularity Vote 💖</title>

<style>
/* KEEP YOUR SAME CSS (unchanged) */
</style>

</head>
<body>

<div class="overlay" id="overlay">
  <div class="big-loader"></div>
  <p>Loading votes... 💖</p>
</div>

<div class="voting-container">
  <h1>✨ Who is the Best? ✨</h1>
  <p class="subtitle">Cast your vote!</p>
  <div class="total-badge">💖 Total Votes: <span id="totalVotes">—</span></div>

  <div class="login-box">
    <label>👤 Username</label>
    <div class="input-row">
      <input type="text" id="usernameInput" placeholder="Enter username..." />
      <button class="enter-btn" onclick="enterUser()">Go 💖</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="user-pill" id="userPill">
      <span class="uname" id="pillName"></span>
    </div>
  </div>

  <div class="candidates-grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ✅ ONLY READ ACCESS (SAFE)
const BIN_URL = "https://api.jsonbin.io/v3/b/69d2da8f36566621a880ddb6/latest";

const CANDIDATES = [
  { id:'mimileni', name:'Mimileni', avatar:'🌸' },
  { id:'batman',   name:'Batman',   avatar:'🦇' },
  { id:'pretty',   name:'Pretty',   avatar:'✨' },
];

let binData = null;
let activeUser = null;
let lastAttempt = 0;

// 🔒 READ ONLY
async function fetchBin(){
  const r = await fetch(BIN_URL);
  const data = await r.json();
  return data.record || data;
}

// ── ENTER USER ──
function enterUser(){
  const username = document.getElementById('usernameInput').value.trim();

  if(!username){
    showToast("Enter username","error");
    return;
  }

  activeUser = username;
  document.getElementById('pillName').textContent = username;
  document.getElementById('userPill').classList.add('show');
  render();
}

// ── VOTE (SECURE) ──
async function handleVote(candidateId){
  if(!activeUser){
    showToast('Enter username first','warn');
    return;
  }

  const now = Date.now();
  if(now - lastAttempt < 3000){
    showToast('Slow down','warn');
    return;
  }
  lastAttempt = now;

  showToast("Saving vote...","info");

  try{
    const res = await fetch('/api/vote',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username: activeUser,
        candidate: candidateId
      })
    });

    const data = await res.json();

    if(!res.ok){
      showToast(data.error,'error');
      return;
    }

    showToast("Vote success 💖","success");

    binData = await fetchBin();
    render();

  }catch{
    showToast("Network error","error");
  }
}

// ── RENDER ──
function render(){
  if(!binData) return;

  const votes = binData.votes || {};
  const total = Object.values(votes).reduce((a,b)=>a+b,0);

  document.getElementById('totalVotes').textContent = total;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  CANDIDATES.forEach(c => {
    const v = votes[c.id] || 0;

    const card = document.createElement('div');
    card.className = 'candidate-card';

    card.innerHTML = `
      <div class="avatar">${c.avatar}</div>
      <div class="name">${c.name}</div>
      <div class="vote-count">${v}</div>
      <button class="vote-btn" onclick="handleVote('${c.id}')">Vote 💖</button>
    `;

    grid.appendChild(card);
  });
}

// ── TOAST ──
function showToast(msg,type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(()=>t.className='toast',2000);
}

// ── INIT ──
async function init(){
  try{
    binData = await fetchBin();
    render();
  }catch{
    showToast("Load failed","error");
  }finally{
    document.getElementById('overlay').style.display='none';
  }
}

init();
</script>

</body>
</html>
