<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Popularity Vote 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}

body{
  background-color:#ffe6ea;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.voting-container{
  background:#ffffff;
  border-radius:30px;
  padding:40px;
  box-shadow:0 10px 30px rgba(255,153,175,0.2);
  max-width:620px;
  width:100%;
  text-align:center;
}

h1{
  font-family:'Fredoka One',cursive;
  color:#ff6b8b;
  font-size:2.5em;
  margin-bottom:6px;
  text-shadow:2px 2px 0px #ffe6ea;
}
p.subtitle{color:#a39ca3;margin-bottom:24px;font-size:1.05em}

.total-badge{
  display:inline-block;
  background:#ffe6ea;
  color:#ff6b8b;
  padding:5px 18px;
  border-radius:20px;
  font-size:.85em;font-weight:800;
  margin-bottom:28px;
}

/* ── LOGIN BOX ── */
.login-box{
  background:#fffafa;
  border:2px solid #ffccd5;
  border-radius:22px;
  padding:22px 20px;
  margin-bottom:28px;
  text-align:left;
}
.login-box label{
  display:block;
  font-size:.82em;font-weight:800;
  color:#a39ca3;
  margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.5px;
}
.input-row{display:flex;gap:10px}
.login-box input{
  flex:1;
  background:#fff;
  border:2px solid #ffccd5;
  border-radius:14px;
  padding:11px 16px;
  color:#555;
  font-size:1em;font-weight:700;
  outline:none;
  transition:border-color .3s;
}
.login-box input:focus{border-color:#ff6b8b}
.login-box input::placeholder{color:#ccc;font-weight:600}

.enter-btn{
  background:#ff6b8b;
  color:#fff;border:none;
  padding:11px 20px;border-radius:14px;
  font-family:'Nunito',sans-serif;
  font-size:.95em;font-weight:800;
  cursor:pointer;white-space:nowrap;
  transition:transform .2s,background .2s;
}
.enter-btn:hover{background:#ff476f;transform:scale(1.05)}
.enter-btn:active{transform:scale(.95)}

.status-msg{
  margin-top:10px;padding:9px 14px;
  border-radius:12px;font-size:.85em;font-weight:700;
  display:none;
}
.status-msg.show{display:block}
.status-msg.ok{background:#e8faf3;color:#059669;border:1.5px solid #a7f3d0}
.status-msg.err{background:#fff0f3;color:#e11d48;border:1.5px solid #fecdd3}
.status-msg.info{background:#fdf4ff;color:#9333ea;border:1.5px solid #e9d5ff}

.user-pill{
  display:none;align-items:center;gap:10px;
  background:#f0fdf4;
  border:1.5px solid #a7f3d0;
  border-radius:12px;padding:9px 14px;
  margin-top:12px;
}
.user-pill.show{display:flex}
.user-pill .uname{font-weight:900;color:#059669;font-size:.92em}
.user-pill .utag{font-size:.75em;color:#a39ca3;margin-left:auto}

/* ── GRID ── */
.candidates-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  gap:20px;
}

/* ── CARD ── */
.candidate-card{
  background:#fffafa;
  border:3px solid #ffccd5;
  border-radius:25px;
  padding:22px 16px;
  transition:all .3s ease;
  position:relative;
  text-align:center;
}
.candidate-card:hover{
  transform:translateY(-10px);
  border-color:#ff99ac;
  box-shadow:0 15px 20px rgba(255,153,175,.3);
}
.candidate-card.voted-card{border-color:#fbbf24;background:#fffbf0}
.candidate-card.winner-glow{
  box-shadow:0 0 0 4px rgba(251,191,36,.3),0 15px 25px rgba(251,191,36,.15);
}

.rank-badge{
  position:absolute;top:12px;left:12px;
  font-size:1.2em;opacity:0;transition:opacity .4s;
}
.rank-badge.show{opacity:1}

.avatar{
  font-size:4em;
  background:#ffe6ea;
  width:100px;height:100px;line-height:100px;
  border-radius:50%;
  margin:0 auto 14px;
  box-shadow:inset 0 5px 10px rgba(255,107,139,.1);
  transition:transform .3s;
}
.candidate-card:hover .avatar{transform:scale(1.1) rotate(5deg)}
.candidate-card.voted-card .avatar{background:#fef3c7}

.name{color:#555;font-size:1.2em;font-weight:800;margin-bottom:6px}

.vote-count{
  display:inline-block;
  background:#ffccff;color:#cc0066;
  padding:4px 14px;border-radius:20px;
  font-size:.85em;font-weight:800;margin-bottom:10px;
}
.candidate-card.voted-card .vote-count{background:#fef3c7;color:#b45309}

.bar-wrap{background:#f5f5f5;border-radius:10px;height:7px;margin-bottom:6px;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,#ff6b8b,#ffacc7);border-radius:10px;transition:width .7s ease;width:0%}
.candidate-card.voted-card .bar{background:linear-gradient(90deg,#fbbf24,#f59e0b)}

.pct-label{font-size:.75em;color:#c9b8c9;font-weight:700;margin-bottom:14px}

.vote-btn{
  background:#ff6b8b;color:#fff;border:none;
  padding:12px 20px;border-radius:20px;
  font-family:'Nunito',sans-serif;
  font-size:1em;font-weight:800;
  cursor:pointer;width:100%;transition:all .2s ease;
}
.vote-btn:hover{background:#ff476f;transform:scale(1.05)}
.vote-btn:active{transform:scale(.95)}
.vote-btn.locked{background:#f0f0f0;color:#bbb;cursor:not-allowed;transform:none}
.vote-btn.my-pick{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#7c4a00;cursor:default}
.vote-btn.need-login{background:#f9f0f3;color:#cca3b0;cursor:not-allowed;transform:none}

/* ── VOTERS LOG ── */
.voters-section{
  margin-top:28px;padding-top:24px;
  border-top:2px dashed #ffccd5;
}
.voters-section h3{
  font-family:'Fredoka One',cursive;
  color:#ffaac0;font-size:1.1em;margin-bottom:14px;
}
.voters-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.voter-chip{
  background:#ffe6ea;color:#ff6b8b;
  border:1.5px solid #ffccd5;
  padding:5px 14px;border-radius:20px;
  font-size:.8em;font-weight:700;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(120px);
  padding:12px 24px;border-radius:30px;
  font-size:.9em;font-weight:800;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#ff6b8b;color:#fff}
.toast.warn{background:#fbbf24;color:#7c4a00}
.toast.error{background:#e11d48;color:#fff}
.toast.info{background:#9333ea;color:#fff}

.loader{
  display:inline-block;width:16px;height:16px;
  border:3px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.overlay{
  position:fixed;inset:0;background:#ffe6ea;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9998;gap:14px;transition:opacity .5s;
}
.overlay.hide{opacity:0;pointer-events:none}
.overlay p{color:#ff99ac;font-weight:800;font-size:.95em}
.big-loader{
  width:44px;height:44px;
  border:5px solid #ffccd5;border-top-color:#ff6b8b;
  border-radius:50%;animation:spin 1s linear infinite;
}

.cp{
  position:fixed;width:9px;height:9px;border-radius:2px;
  animation:fall linear forwards;pointer-events:none;z-index:9999;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="big-loader"></div>
  <p>Loading votes... 💖</p>
</div>

<div class="voting-container">
  <h1>✨ Who is the Best? ✨</h1>
  <p class="subtitle">Cast your vote for your favourite SoloLearn user!</p>
  <div class="total-badge">💖 Total Votes: <span id="totalVotes">—</span></div>

  <div class="login-box">
    <label>👤 Your SoloLearn Username</label>
    <div class="input-row">
      <input type="text" id="usernameInput" placeholder="Enter your SL username..." autocomplete="off" />
      <button class="enter-btn" id="enterBtn" onclick="enterUser()">Let's Go! 💖</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="user-pill" id="userPill">
      <span>💖</span>
      <span class="uname" id="pillName"></span>
      <span class="utag">Now vote below! 👇</span>
    </div>
  </div>

  <div class="candidates-grid" id="grid"></div>

  <div class="voters-section" id="votersSection" style="display:none">
    <h3>🗳️ Who Voted</h3>
    <div class="voters-list" id="votersList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BIN_ID  = '69d2da8f36566621a880ddb6';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const CANDIDATES = [
  { id:'mimileni', name:'Mimileni', avatar:'🌸' },
  { id:'pretty',   name:'Pretty',   avatar:'✨' },
];

let binData      = null;
let activeUser   = null;
let lastAttempt  = 0;

async function fetchBin(){
  const r = await fetch(BIN_URL + '/latest');
  if(!r.ok) throw new Error('Fetch failed');
  return await r.json();
}
  if(!r.ok) throw new Error('Update failed');
}

// ── ENTER USERNAME ──
function enterUser(){
  const input    = document.getElementById('usernameInput');
  const username = input.value.trim();

  if(!username || username.length < 2){
    showStatus('Please enter your SL username 😅','err'); return;
  }
  if(username.length > 30){
    showStatus('Username too long!','err'); return;
  }

  // Check if already voted
  if(binData){
    const already = binData.voted_users.find(
      v => v.username.toLowerCase() === username.toLowerCase()
    );
    if(already){
      showStatus(`⚠️ "${username}" already voted for ${already.voted_for}!`,'err');
      // Still show the results with their vote highlighted
      activeUser = username;
      render();
      return;
    }
  }

  activeUser = username;
  document.getElementById('pillName').textContent = username;
  document.getElementById('userPill').classList.add('show');
  showStatus(`Hey ${username}! Pick your favourite below 👇`,'ok');
  render();
}

function showStatus(msg, type){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
}

// ── VOTE ──
async function handleVote(candidateId){
  if(!activeUser){
    showToast('👤 Enter your username first!','warn'); return;
  }

  const already = binData.voted_users.find(
    v => v.username.toLowerCase() === activeUser.toLowerCase()
  );
  if(already){ showToast('⚠️ You already voted!','warn'); return; }

  const now = Date.now();
  if(now - lastAttempt < 3000){ showToast('🐢 Slow down!','warn'); return; }
  lastAttempt = now;

  document.querySelectorAll('.vote-btn').forEach(b=>{
    b.disabled=true; b.className='vote-btn locked';
  });
  showToast('💾 Saving your vote...','info');

  try{
  const res = await fetch('/api/vote',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username: activeUser,
      candidate: candidateId
    })
  });

  const data = await res.json();

  if(!res.ok){
    showToast(data.error || '❌ Error','error');
    render();
    return;
  }

  showToast('💖 Vote successful!','success');
  launchConfetti();

  binData = await fetchBin();
  render();

}catch(e){
  showToast('❌ Network error','error');
  render();
  }

    const cand = CANDIDATES.find(c => c.id === candidateId);
    latest.votes[candidateId] = (latest.votes[candidateId]||0) + 1;
    latest.voted_users.push({
      username: activeUser,
      voted_for: cand.name,
      time: new Date().toISOString()
    });

    await updateBin(latest);
    binData = latest;
    showToast(`💖 Voted for ${cand.name}! Thank you!`,'success');
    launchConfetti();
    render();

  }catch(e){
    showToast('❌ Error! Try again.','error');
    render();
  }
}

// ── RENDER ──
function render(){
  if(!binData) return;
  const votes      = binData.votes || {};
  const votedUsers = binData.voted_users || [];
  const total      = Object.values(votes).reduce((a,b)=>a+b,0);

  document.getElementById('totalVotes').textContent = total;

  const myRecord = activeUser
    ? votedUsers.find(v => v.username.toLowerCase() === activeUser.toLowerCase())
    : null;

  const sorted = [...CANDIDATES].sort((a,b)=>(votes[b.id]||0)-(votes[a.id]||0));
  const rankMap = {};
  sorted.forEach((c,i) => rankMap[c.id] = i+1);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  CANDIDATES.forEach(c => {
    const v    = votes[c.id] || 0;
    const pct  = total > 0 ? Math.round(v/total*100) : 0;
    const rank = rankMap[c.id];
    const isMyVote = myRecord?.voted_for === c.name;
    const isWinner = rank === 1 && total > 0;
    const rankEmoji = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';

    let btnClass='vote-btn', btnText='Vote! 💖';
    if(isMyVote)           { btnClass='vote-btn my-pick';   btnText='✅ Your Pick'; }
    else if(myRecord)      { btnClass='vote-btn locked';    btnText='🔒 Voted'; }
    else if(!activeUser)   { btnClass='vote-btn need-login';btnText='Enter name first 👤'; }

    const card = document.createElement('div');
    card.className = 'candidate-card'
      +(isMyVote?' voted-card':'')
      +(isWinner?' winner-glow':'');

    card.innerHTML = `
      <div class="rank-badge ${total>0?'show':''}">${rankEmoji}</div>
      <div class="avatar">${c.avatar}</div>
      <div class="name">${c.name}</div>
      <div class="vote-count">${v} Vote${v!==1?'s':''}</div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <div class="pct-label">${pct}% of votes</div>
      <button class="${btnClass}" onclick="handleVote('${c.id}')"
        ${(myRecord||!activeUser)?'disabled':''}>
        ${btnText}
      </button>
    `;
    grid.appendChild(card);
  });

  // Voters log
  const vs = document.getElementById('votersSection');
  const vl = document.getElementById('votersList');
  if(votedUsers.length > 0){
    vs.style.display = 'block';
    vl.innerHTML = votedUsers.map(v =>
      `<div class="voter-chip">👤 ${v.username} → ${v.voted_for}</div>`
    ).join('');
  } else {
    vs.style.display = 'none';
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.className='toast', 3000);
}

// ── CONFETTI ──
function launchConfetti(){
  const colors=['#ff6b8b','#ffacc7','#fbbf24','#34d399','#c084fc','#ffccd5'];
  for(let i=0;i<50;i++){
    const el = document.createElement('div');
    el.className = 'cp';
    el.style.cssText = `
      left:${Math.random()*100}vw;top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*.4}s;
      border-radius:${Math.random()>.5?'50%':'3px'};
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── INIT ──
async function init(){
  try{
    binData = await fetchBin();
    CANDIDATES.forEach(c=>{
      if(binData.votes[c.id]===undefined) binData.votes[c.id]=0;
    });
    if(!Array.isArray(binData.voted_users)) binData.voted_users=[];
    render();
  }catch(e){
    showToast('❌ Could not load votes!','error');
  }finally{
    const ov = document.getElementById('overlay');
    ov.classList.add('hide');
    setTimeout(()=>ov.remove(), 600);
  }
}

document.getElementById('usernameInput')
  .addEventListener('keydown', e=>{ if(e.key==='Enter') enterUser(); });

init();
</script>
</body>
</html>
