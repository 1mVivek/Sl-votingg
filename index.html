<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Voting Game ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:    #ff6b8b;
      --pink-lt: #ffe6ea;
      --pink-md: #ffccd5;
      --accent:  #ff99ac;
      --text:    #4a3f4a;
      --muted:   #a39ca3;
      --white:   #ffffff;
      --card-bg: #fffafa;
      --shadow:  rgba(255, 107, 139, 0.22);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-lt);
      background-image:
        radial-gradient(circle at 15% 20%, #ffd6e0 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, #fce4ff 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .header { text-align: center; margin-bottom: 36px; }
    .header h1 {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--pink);
      text-shadow: 3px 3px 0 var(--pink-md);
    }
    .header p { color: var(--muted); font-size: 1.05em; margin-top: 6px; }

    /* ── SEARCH ── */
    .search-wrap {
      background: var(--white);
      border-radius: 24px;
      padding: 28px 32px;
      box-shadow: 0 8px 30px var(--shadow);
      width: 100%;
      max-width: 480px;
      margin-bottom: 36px;
    }
    .search-wrap label { display: block; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .search-row { display: flex; gap: 10px; }
    .search-row input {
      flex: 1; padding: 12px 18px;
      border: 2px solid var(--pink-md); border-radius: 16px;
      font-size: 1em; font-family: inherit; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--pink); }
    .search-row button {
      background: var(--pink); color: #fff; border: none;
      border-radius: 16px; padding: 12px 20px;
      font-size: 1em; font-weight: 800; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.15s; white-space: nowrap;
    }
    .search-row button:hover  { background: #ff476f; }
    .search-row button:active { transform: scale(0.95); }
    .search-row button:disabled { background: var(--pink-md); cursor: not-allowed; }

    .status-msg {
      margin-top: 12px; min-height: 24px;
      font-size: 0.95em; font-weight: 700;
      border-radius: 10px; padding: 6px 12px;
      display: inline-block; transition: all 0.3s;
    }
    .status-msg.hidden  { opacity: 0; }
    .status-msg.error   { background: #fff0f3; color: #e0003c; }
    .status-msg.success { background: #f0fff6; color: #00854a; }
    .status-msg.info    { background: #fffbe6; color: #856800; }
    .status-msg.loading { background: #f3f0ff; color: #6930c3; }

    .voter-badge {
      display: none; align-items: center; gap: 10px;
      margin-top: 16px; background: var(--pink-lt);
      border-radius: 16px; padding: 10px 16px;
    }
    .voter-badge.visible { display: flex; }
    .voter-badge .vname  { font-weight: 800; color: var(--pink); }
    .voter-badge .vtag {
      font-size: 0.8em; background: var(--white);
      border: 1.5px solid var(--pink-md); color: var(--muted);
      border-radius: 20px; padding: 2px 10px;
    }
    .voter-badge .vtag.voted { border-color: #c084fc; color: #7e22ce; background: #faf5ff; }

    /* ── CARDS ── */
    .candidates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 22px; width: 100%; max-width: 640px;
    }
    .candidate-card {
      background: var(--card-bg); border: 3px solid var(--pink-md);
      border-radius: 28px; padding: 26px 20px; text-align: center;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .candidate-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, #fff5f8 0%, transparent 60%);
      pointer-events: none;
    }
    .candidate-card:hover {
      transform: translateY(-8px); border-color: var(--accent);
      box-shadow: 0 18px 30px var(--shadow);
    }
    .candidate-card.winner { border-color: #c084fc; background: linear-gradient(135deg,#fdf4ff,#fff5f8); }
    .candidate-card.winner::after {
      content: '👑'; position: absolute; top: -4px; right: 10px;
      font-size: 1.6em; filter: drop-shadow(0 2px 4px rgba(0,0,0,.15));
    }
    .avatar {
      font-size: 3.6em; background: var(--pink-lt);
      width: 90px; height: 90px; line-height: 90px;
      border-radius: 50%; margin: 0 auto 14px;
      box-shadow: inset 0 4px 10px rgba(255,107,139,.12);
    }
    .name { color: var(--text); font-family: 'Baloo 2', cursive; font-size: 1.2em; font-weight: 800; margin-bottom: 6px; }
    .bar-wrap { background: var(--pink-lt); border-radius: 20px; height: 10px; margin: 8px 0 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg,var(--accent),var(--pink)); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .vote-count { display: inline-block; background: #ffccff; color: #cc0066; padding: 4px 14px; border-radius: 20px; font-size: .88em; font-weight: 800; margin-bottom: 14px; }
    .vote-btn {
      background: var(--pink); color: #fff; border: none;
      padding: 11px 22px; border-radius: 18px;
      font-size: 1em; font-weight: 800; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      width: 100%;
    }
    .vote-btn:hover  { background: #ff476f; transform: scale(1.04); }
    .vote-btn:active { transform: scale(0.96); }
    .vote-btn:disabled { background: var(--pink-md); color: #c47b8e; cursor: not-allowed; transform: none; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid #fff4; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop  { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
    .popped { animation: pop .4s ease forwards; }

    .confetti-bar { width: 100%; max-width: 640px; text-align: center; font-size: 1.5em; letter-spacing: 4px; min-height: 32px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="header">
  <h1>✨ Who is the Best? ✨</h1>
  <p>Search your name to cast your vote!</p>
</div>

<div class="search-wrap">
  <label for="voterInput">🔍 Enter your name to verify</label>
  <div class="search-row">
    <input type="text" id="voterInput" placeholder="Your name…" autocomplete="off" />
    <button id="searchBtn" onclick="checkVoter()">Check</button>
  </div>
  <div id="statusMsg" class="status-msg hidden"></div>
  <div id="voterBadge" class="voter-badge">
    <span>👤</span>
    <span class="vname" id="badgeName"></span>
    <span class="vtag" id="badgeTag">Ready to vote</span>
  </div>
</div>

<div class="confetti-bar" id="confettiBar"></div>
<div class="candidates-grid" id="candidatesGrid"></div>

<script>
// ── NO API KEYS HERE — everything goes through /api/* ──────────────────

const CANDIDATES = [
  { id: 'p1', emoji: '🐱', name: 'Player One'   },
  { id: 'p2', emoji: '🐶', name: 'Player Two'   },
  { id: 'p3', emoji: '🐰', name: 'Player Three' },
];

let currentVoter = null;  // { name, hasVoted }
let currentVotes = {};    // { p1: N, p2: N, p3: N }

// ── API CALLS ────────────────────────────────────────────────────────────

async function apiFetch(path, options = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── CHECK VOTER ──────────────────────────────────────────────────────────

async function checkVoter() {
  const raw = document.getElementById('voterInput').value.trim();
  if (!raw) { showStatus('Please enter your name 🙈', 'error'); return; }

  showStatus('Checking… ✨', 'loading');
  setSearchDisabled(true);

  try {
    const data = await apiFetch('/api/check-voter', {
      method: 'POST',
      body: JSON.stringify({ name: raw }),
    });

    if (!data.allowed) {
      showStatus(`"${raw}" is not on the voter list 😢`, 'error');
      currentVoter = null;
      hideBadge();
    } else {
      currentVoter = { name: raw, hasVoted: data.hasVoted };
      showBadge(raw, data.hasVoted);
      showStatus(
        data.hasVoted
          ? `You already voted, ${raw}! Here are the results 📊`
          : `Welcome, ${raw}! Pick your favourite below 🎉`,
        data.hasVoted ? 'info' : 'success'
      );
    }
    renderCards();
  } catch (e) {
    showStatus('Error: ' + e.message, 'error');
  } finally {
    setSearchDisabled(false);
  }
}

// ── CAST VOTE ────────────────────────────────────────────────────────────

async function castVote(candidateId) {
  if (!currentVoter || currentVoter.hasVoted) return;

  const btn = document.getElementById('btn-' + candidateId);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const data = await apiFetch('/api/vote', {
      method: 'POST',
      body: JSON.stringify({ name: currentVoter.name, candidateId }),
    });

    currentVoter.hasVoted = true;
    currentVotes = data.votes;
    showStatus(`Vote cast! Thanks ${currentVoter.name} 🎊`, 'success');
    showBadge(currentVoter.name, true);
    confettiBurst();

    const card = document.getElementById('card-' + candidateId);
    card.classList.add('popped');
    setTimeout(() => card.classList.remove('popped'), 500);

    renderCards();
  } catch (e) {
    // Handle specific server errors
    if (e.message === 'Already voted') {
      currentVoter.hasVoted = true;
      showStatus('You already voted! 🙈', 'info');
    } else {
      showStatus('Vote failed: ' + e.message, 'error');
    }
    renderCards();
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────

function renderCards() {
  const grid   = document.getElementById('candidatesGrid');
  const totals = CANDIDATES.map(c => currentVotes[c.id] || 0);
  const maxV   = Math.max(...totals, 1);

  grid.innerHTML = '';
  CANDIDATES.forEach((c, i) => {
    const count    = totals[i];
    const pct      = Math.round((count / maxV) * 100);
    const isWinner = count > 0 && count === Math.max(...totals);
    const canVote  = currentVoter && !currentVoter.hasVoted;

    const card = document.createElement('div');
    card.className = 'candidate-card' + (isWinner ? ' winner' : '');
    card.id = 'card-' + c.id;
    card.innerHTML = `
      <div class="avatar">${c.emoji}</div>
      <div class="name">${c.name}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="vote-count">${count} vote${count !== 1 ? 's' : ''}</div>
      <button class="vote-btn" id="btn-${c.id}"
        ${canVote ? '' : 'disabled'}
        onclick="castVote('${c.id}')">
        ${canVote ? 'Vote! 💖' : currentVoter?.hasVoted ? 'Voted ✅' : 'Locked 🔒'}
      </button>
    `;
    grid.appendChild(card);
  });
}

// ── UI UTILS ─────────────────────────────────────────────────────────────

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}
function setSearchDisabled(v) {
  document.getElementById('searchBtn').disabled = v;
  document.getElementById('voterInput').disabled = v;
}
function showBadge(name, hasVoted) {
  document.getElementById('voterBadge').classList.add('visible');
  document.getElementById('badgeName').textContent = name;
  const tag = document.getElementById('badgeTag');
  tag.textContent = hasVoted ? 'Already voted' : 'Ready to vote';
  tag.className = 'vtag' + (hasVoted ? ' voted' : '');
}
function hideBadge() {
  document.getElementById('voterBadge').classList.remove('visible');
}
function confettiBurst() {
  const bar = document.getElementById('confettiBar');
  const p = ['🎉','✨','🌸','💖','🎊','🌟','💕','🎈'];
  bar.textContent = Array.from({length:12}, () => p[Math.floor(Math.random()*p.length)]).join(' ');
  setTimeout(() => bar.textContent = '', 3000);
}

// ── INIT ─────────────────────────────────────────────────────────────────

(async () => {
  try {
    const data = await apiFetch('/api/votes');
    currentVotes = data.votes;
    renderCards();
  } catch (e) {
    document.getElementById('candidatesGrid').innerHTML =
      `<p style="color:#e0003c;font-weight:700;grid-column:1/-1">Could not load votes: ${e.message}</p>`;
  }
})();

document.getElementById('voterInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkVoter();
});
</script>
</body>
</html>
